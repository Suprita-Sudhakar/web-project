<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduHealth-AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

/* ===== GRID ===== */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: 
        linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: moveGrid 20s linear infinite;
    z-index: 0;
}

@keyframes moveGrid {
    100% { transform: translate(-60px, -60px); }
}

/* ===== ORBS ===== */
.bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    z-index: 0;
}
.orb1 { width: 300px; height: 300px; background:#00ffff; top:10%; left:20%; }
.orb2 { width: 250px; height: 250px; background:#0099ff; bottom:10%; right:20%; }
.orb3 { width: 200px; height: 200px; background:#00ffff; bottom:30%; left:60%; }

/* ===== GRAPH ===== */
.bg-graph {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0.06;
    z-index: 0;
    transition: transform 0.2s;
}

.line {
    fill: none;
    stroke: #00ffff;
    stroke-width: 2;
    stroke-dasharray: 10;
    animation: moveLine 10s linear infinite;
}

@keyframes moveLine {
    100% { stroke-dashoffset: 100; }
}

/* ===== NEURAL NETWORK ===== */
.neural {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.15;
}

.node {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #00ffff;
    border-radius: 50%;
    box-shadow: 0 0 8px #00ffff;
    animation: blink 2s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

.line-connect {
    position: absolute;
    height: 1px;
    background: #00ffff;
    opacity: 0.2;
}

/* ===== MAIN ===== */
.main-container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ===== CIRCLE ===== */
.ai-circle {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 30px;
}

.ai-circle::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border: 3px dashed #00ffff;
    border-radius: 50%;
    animation: rotate 8s linear infinite;
    box-shadow: 0 0 30px #00ffff;
}

.ai-circle::after {
    content: "";
    position: absolute;
    width: 80%;
    height: 80%;
    border-radius: 50%;
    background: rgba(0,255,255,0.08);
    box-shadow: inset 0 0 20px #00ffff;
}

.circle-text h1 {
    font-size: 30px;
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
}

.orbit {
    position: absolute;
    width: 100%;
    height: 100%;
    animation: rotate 4s linear infinite;
}

.orbit::before {
    content: "";
    position: absolute;
    top: -6px;
    left: 50%;
    width: 12px;
    height: 12px;
    background: #00ffff;
    border-radius: 50%;
}

@keyframes rotate {
    100% { transform: rotate(360deg); }
}

/* TEXT */
.prediction-text {
    font-size: 22px;
    color: #ccc;
    margin-bottom: 20px;
}

/* BUTTONS */
.btn-custom {
    padding: 12px 30px;
    border-radius: 30px;
    margin: 10px;
}

.btn-custom:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #00ffff;
}

</style>
</head>

<body>

<!-- ORBS -->
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<!-- GRAPH -->
<svg class="bg-graph" id="graph" viewBox="0 0 1000 500">
    <path class="line" d="M0,300 Q200,200 400,280 T800,260 T1000,300" />
</svg>

<!-- NEURAL NETWORK -->
<div class="neural" id="neural"></div>

<!-- MAIN -->
<div class="main-container">

    <div class="ai-circle">
        <div class="orbit"></div>
        <div class="circle-text">
            <h1>EduHealth-AI</h1>
        </div>
    </div>

    <div class="prediction-text">Prediction System</div>

    <div>
        <a href="{% url 'login1' %}" class="btn btn-outline-info btn-custom">Get Started</a>
        <a href="#" class="btn btn-outline-light btn-custom">Learn More</a>
    </div>

</div>

<script>

/* ===== MOUSE INTERACTION ===== */
document.addEventListener("mousemove", (e) => {
    const graph = document.getElementById("graph");
    let x = (e.clientX / window.innerWidth - 0.5) * 30;
    let y = (e.clientY / window.innerHeight - 0.5) * 30;
    graph.style.transform = `translate(${x}px, ${y}px)`;
});

/* ===== NEURAL NETWORK GENERATOR ===== */
const neural = document.getElementById("neural");

let nodes = [];

/* create nodes */
for(let i=0;i<20;i++){
    let node = document.createElement("div");
    node.classList.add("node");

    let x = Math.random()*window.innerWidth;
    let y = Math.random()*window.innerHeight;

    node.style.left = x + "px";
    node.style.top = y + "px";

    neural.appendChild(node);
    nodes.push({x,y});
}

/* connect nodes */
nodes.forEach((n1,i)=>{
    nodes.forEach((n2,j)=>{
        if(i<j){
            let dx = n1.x - n2.x;
            let dy = n1.y - n2.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 200){
                let line = document.createElement("div");
                line.classList.add("line-connect");

                line.style.width = dist + "px";
                line.style.left = n1.x + "px";
                line.style.top = n1.y + "px";

                let angle = Math.atan2(dy,dx) * 180/Math.PI;
                line.style.transform = `rotate(${angle}deg)`;

                neural.appendChild(line);
            }
        }
    });
});

</script>

</body>
</html>
