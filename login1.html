<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | EduHealth-AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;

    background: linear-gradient(-45deg, #000000, #0a192f, #001f3f, #000814);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
}

/* Gradient animation */
@keyframes gradientMove {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

/* ===== WAVE BACKGROUND ===== */
.wave {
    position:absolute;
    width:200%;
    height:200px;
    background:rgba(0,255,255,0.05);
    border-radius:50%;
    bottom:-50px;
    animation: waveMove 8s linear infinite;
}

.wave:nth-child(2){
    bottom:-80px;
    animation-duration:12s;
}

@keyframes waveMove{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
}

/* ===== LOGIN BOX ===== */
.form-box{
    position:relative;
    width:380px;
    padding:40px;
    border-radius:15px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(15px);
    box-shadow:0 0 30px rgba(0,255,255,0.2);
    z-index:2;
}

/* TITLE */
.form-box h2{
    text-align:center;
    color:#00ffff;
    margin-bottom:30px;
    text-shadow:0 0 10px #00ffff;
}

/* INPUT GROUP */
.input-group{
    position:relative;
    margin-bottom:25px;
}

/* INPUT */
.input-group input{
    width:100%;
    padding:12px;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:8px;
    color:white;
    outline:none;
}

/* LABEL */
.input-group label{
    position:absolute;
    top:50%;
    left:12px;
    transform:translateY(-50%);
    color:#ccc;
    font-size:14px;
    transition:0.3s;
}

/* FLOAT LABEL */
.input-group input:focus + label,
.input-group input:valid + label{
    top:-8px;
    font-size:12px;
    color:#00ffff;
    background:black;
    padding:0 5px;
}

/* ICON DEFAULT */
.input-group i{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%) scale(1);
    color:black;
    transition:0.3s ease;
}

/* 🔥 ICON GLOW EFFECT */
.input-group input:focus ~ i{
    color:#00ffff;
    transform:translateY(-50%) scale(1.2);
    text-shadow:
        0 0 5px #00ffff,
        0 0 10px #00ffff,
        0 0 20px #00ffff;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#00ffff;
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    box-shadow:0 0 20px #00ffff;
}

/* LINK */
.link{
    text-align:center;
    margin-top:15px;
}

.link a{
    color:#00ffff;
    text-decoration:none;
}

.link a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<!-- WAVE BACKGROUND -->
<div class="wave"></div>
<div class="wave"></div>

<!-- LOGIN FORM -->
<form method="post" class="form-box">

    <h2>Login</h2>

    {% csrf_token %}

    <div class="input-group">
        <input type="text" name="username" required>
        <label>Username</label>
        <i class='bx bxs-user'></i>
    </div>

    <div class="input-group">
        <input type="password" name="pass" required>
        <label>Password</label>
        <i class='bx bxs-lock-alt'></i>
    </div>

    <button type="submit">Login</button>

    <div class="link">
        <a href="{% url 'signup1' %}">Create Account</a>
    </div>

</form>

</body>
</html>
